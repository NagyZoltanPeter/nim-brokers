name: CI

on:
  push:
    branches:
      - master
      - main
    tags:
      - '*'
    paths-ignore:
      - 'doc/**'
      - '**.md'
      - '**.html'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: status-im/nimbus-common-workflow/.github/workflows/common.yml@main
    with:
      nim-versions: '["version-2-0", "version-2-2", "devel"]'
      nimble-version: 1267aa826b187ede62f8e1deb9eb40ca1038260f
      test-command: |
        nimble setup -l
        nimble test --verbose
        nimble testApi --verbose

  examples:
    runs-on: ubuntu-latest
    env:
      NIM_VERSION: '2.2.0'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ env.NIM_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies (nimble)
        run: nimble install -d -y

      - name: Show tool versions
        run: |
          nim --version
          nimble --version
          cmake --version
          python3 --version

      - name: Run C FFI example
        run: nimble runFfiExampleC -y --verbose

      - name: Run C++ FFI example
        run: nimble runFfiExampleCpp -y --verbose

      - name: Run Python FFI example
        run: nimble runFfiExamplePy -y --verbose

  nph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check `nph` formatting
        uses: arnetheduck/nph-action@v1
        with:
          version: 0.7.0
