name: CI

on:
  push:
    branches:
      - master
      - main
    tags:
      - '*'
    paths-ignore:
      - 'doc/**'
      - '**.md'
      - '**.html'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Stable: blocking. Tracks the latest 2.2.x release. Nim 2.0 was dropped
  # because refc + chronos thread-pool callbacks on Windows and refc +
  # foreign-thread allocator on macOS both crash deterministically under
  # 2.0; 2.2 fixed the macOS side.
  build:
    uses: status-im/nimbus-common-workflow/.github/workflows/common.yml@main
    with:
      nim-versions: '["version-2-2"]'
      nimble-version: 1267aa826b187ede62f8e1deb9eb40ca1038260f
      test-command: |
        nimble setup -l
        nimble test --verbose
        nimble testApi --verbose
        nimble testFfiApi --verbose
        nimble testFfiApiCpp --verbose

  # Devel: informational. continue-on-error so an upstream Nim regression
  # does not block PRs. Nim 2.3.1 currently regresses refc release-mode
  # cross-thread allocation (heap corruption in alloc.nim:942 after
  # repeated createContext/shutdown lifecycles); stable 2.2 is unaffected.
  build-devel:
    continue-on-error: true
    uses: status-im/nimbus-common-workflow/.github/workflows/common.yml@main
    with:
      nim-versions: '["devel"]'
      nimble-version: 1267aa826b187ede62f8e1deb9eb40ca1038260f
      test-command: |
        nimble setup -l
        nimble test --verbose
        nimble testApi --verbose
        nimble testFfiApi --verbose
        nimble testFfiApiCpp --verbose

  examples:
    runs-on: ubuntu-latest
    env:
      NIM_VERSION: '2.2.0'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ env.NIM_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies (nimble)
        run: nimble install -d -y

      - name: Show tool versions
        run: |
          nim --version
          nimble --version
          cmake --version
          python3 --version

      - name: Run C FFI example
        run: nimble runFfiExampleC -y --verbose

      - name: Run C++ FFI example
        run: nimble runFfiExampleCpp -y --verbose

      - name: Run Python FFI example
        run: nimble runFfiExamplePy -y --verbose

  nph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check `nph` formatting
        uses: arnetheduck/nph-action@v1
        with:
          version: 0.7.0
