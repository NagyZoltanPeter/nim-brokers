name: CI

on:
  push:
    branches:
      - main
    tags:
      - '*'
    paths-ignore:
      - 'doc/**'
      - '**.md'
      - '**.html'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: status-im/nimbus-common-workflow/.github/workflows/common.yml@main
    with:
      nim-versions: '["version-2-0", "version-2-2", "devel"]'
      nimble-version: 1267aa826b187ede62f8e1deb9eb40ca1038260f
      test-command: |
        nimble setup -l
        nimble test
        nimble perftest

  nph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check `nph` formatting
        uses: arnetheduck/nph-action@v1
        with:
          version: 0.7.0
