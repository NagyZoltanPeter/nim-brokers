name: CI

on:
  push:
    branches:
      - master
      - main
    tags:
      - '*'
    paths-ignore:
      - 'doc/**'
      - '**.md'
      - '**.html'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Inline matrix: replaces the previous status-im/nimbus-common-workflow
  # caller so we can mark devel as informational with continue-on-error
  # (GitHub forbids that field on `uses:` reusable-workflow jobs).
  #
  # Nim 2.0.x is unsupported (refc + foreign-thread regression on macOS;
  # see README). 2.2.4 and 2.2.10 both gate PRs; devel is per-matrix-entry
  # continue-on-error so upstream regressions don't block merges.
  #
  # Linux gcc-14 and other architectures (raspberry-pi / android) are
  # planned as later phases.
  build:
    name: ${{ matrix.platform.id }} / Nim ${{ matrix.nim }}
    runs-on: ${{ matrix.platform.runs-on }}
    continue-on-error: ${{ matrix.nim == 'devel' }}
    strategy:
      fail-fast: false
      matrix:
        nim: ["2.2.4", "2.2.10", "devel"]
        platform:
          - { id: linux-amd64,  runs-on: ubuntu-latest }
          - { id: win-amd64,    runs-on: windows-latest }
          - { id: macos-arm64,  runs-on: macos-14 }
          - { id: macos-amd64,  runs-on: macos-13 }
        exclude:
          # jiro4989/setup-nim-action does not support installing Nim devel
          # on Windows. Manual devel verification on Windows stays available
          # via memcheck_ci.yml workflow_dispatch.
          - nim: "devel"
            platform: { id: win-amd64, runs-on: windows-latest }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ matrix.nim }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure clang in PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # nimWindowsCcFlag in brokers.nimble forces --cc:clang for FFI
          # builds (CRT alignment with the cmake side). LLVM ships at
          # C:\Program Files\LLVM\bin on windows-latest but is not on
          # PATH by default.
          $llvmBin = "C:\Program Files\LLVM\bin"
          if (Test-Path $llvmBin) {
            Write-Host "Found LLVM at $llvmBin"
            echo $llvmBin >> $env:GITHUB_PATH
          } else {
            Write-Host "LLVM not found, installing via choco..."
            choco install llvm -y --no-progress
            echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH
          }

      - name: Show tool versions
        shell: bash
        run: |
          nim --version
          nimble --version
          cmake --version
          python3 --version || python --version || true

      - name: Install dependencies
        shell: bash
        run: |
          nimble setup -l
          nimble install -d -y

      - name: Run nimble test
        shell: bash
        run: nimble test --verbose

      - name: Run nimble testApi
        shell: bash
        run: nimble testApi --verbose

      - name: Run nimble testFfiApi
        shell: bash
        run: nimble testFfiApi --verbose

      - name: Run nimble testFfiApiCpp
        shell: bash
        run: nimble testFfiApiCpp --verbose

  examples:
    runs-on: ubuntu-latest
    env:
      NIM_VERSION: '2.2.10'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ env.NIM_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies (nimble)
        run: nimble install -d -y

      - name: Show tool versions
        run: |
          nim --version
          nimble --version
          cmake --version
          python3 --version

      - name: Run C FFI example
        run: nimble runFfiExampleC -y --verbose

      - name: Run C++ FFI example
        run: nimble runFfiExampleCpp -y --verbose

      - name: Run Python FFI example
        run: nimble runFfiExamplePy -y --verbose

  nph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check `nph` formatting
        uses: arnetheduck/nph-action@v1
        with:
          version: 0.7.0
