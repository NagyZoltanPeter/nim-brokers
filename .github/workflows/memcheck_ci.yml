name: Sanitizer CI

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner platform (use 'all' to fan out across the matrix)"
        required: true
        type: choice
        default: ubuntu-latest
        options:
          - all
          - ubuntu-latest
          - windows-latest
          - macos-latest
          - macos-15
          - macos-15-intel
      nim-version:
        description: "Nim compiler version (use 'all' to run 2.2.4, 2.2.10, devel)"
        required: true
        type: choice
        default: "2.2.10"
        options:
          - "all"
          - "2.2.10"
          - "2.2.4"
          - "devel"
      tasks:
        description: "Sanitizer task(s) to run ('all' = ASan+UBSan, TSan, +LSan on Linux)"
        required: true
        type: choice
        default: all
        options:
          - all
          - allAsan
          - allTsan
          - allAsanLeak
          - allSan
          - testApiTeardownAsanOrc
          - testApiTeardownTsanOrc
          - testMtEventBrokerTsanOrc
          - testMtRequestBrokerTsanOrc
          - probeWinTlsUninitOrc
          - probeWinTlsUninitRefc

permissions:
  contents: read

jobs:
  # Compute the runner × Nim-version matrix from inputs. Either dimension
  # may be a single value or "all"; the cartesian product is emitted as
  # JSON for the downstream job to consume via fromJSON.
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
    steps:
      - id: compute
        env:
          RUNNER_IN: ${{ inputs.runner }}
          NIM_IN: ${{ inputs.nim-version }}
        run: |
          if [ "$RUNNER_IN" = "all" ]; then
            runners='["ubuntu-latest","windows-latest","macos-latest","macos-15-intel"]'
          else
            runners="[\"$RUNNER_IN\"]"
          fi
          if [ "$NIM_IN" = "all" ]; then
            nims='["2.2.4","2.2.10","devel"]'
          else
            nims="[\"$NIM_IN\"]"
          fi
          matrix=$(jq -nc \
            --argjson r "$runners" \
            --argjson n "$nims" \
            '[ $r[] as $runner | $n[] as $nim
               | {runner: $runner, "nim-version": $nim} ]')
          echo "Computed matrix: $matrix"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  memcheck-ci:
    needs: setup-matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}
    name: ${{ matrix.runner }} · nim ${{ matrix['nim-version'] }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix['nim-version'] == 'devel' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ matrix['nim-version'] }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y clang

      - name: Ensure clang in PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $llvmBin = "C:\Program Files\LLVM\bin"
          if (Test-Path $llvmBin) {
            Write-Host "Found LLVM at $llvmBin"
            echo $llvmBin >> $env:GITHUB_PATH
          } else {
            Write-Host "LLVM not found, installing via choco..."
            choco install llvm -y --no-progress
            echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH
          }

      - name: Locate ASAN runtime DLL (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # clang's -fsanitize=address links the .exe against
          # clang_rt.asan_dynamic-x86_64.dll which lives under
          # LLVM\lib\clang\<ver>\lib\windows, not LLVM\bin. Without it on
          # PATH the test binary fails STATUS_DLL_NOT_FOUND on launch and
          # produces no stderr — nimble only sees a non-zero exit.
          $asan = Get-ChildItem "C:\Program Files\LLVM\lib\clang" `
            -Filter "clang_rt.asan_dynamic-x86_64.dll" `
            -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($asan) {
            Write-Host "ASAN runtime: $($asan.FullName)"
            echo $asan.DirectoryName >> $env:GITHUB_PATH
          } else {
            Write-Host "::warning::clang_rt.asan_dynamic-x86_64.dll not found under C:\Program Files\LLVM\lib\clang"
          }

      - name: Show tool versions
        shell: bash
        run: |
          nim --version
          nimble --version
          clang --version || echo "clang not available"
          cmake --version || echo "cmake not available"

      - name: Install dependencies
        run: |
          nimble setup -l
          nimble install -d -y

      - name: Run tasks (Unix)
        if: runner.os != 'Windows'
        env:
          TASKS: ${{ inputs.tasks }}
        run: |
          # ASan+UBSan and TSan everywhere; LSan (asanleak) only on Linux,
          # where LeakSanitizer is supported (it is a no-op on macOS).
          ALL="allAsan allTsan"
          if [ "$(uname)" = "Linux" ]; then ALL="$ALL allAsanLeak"; fi
          [ "$TASKS" = "all" ] && TASKS="$ALL"
          mkdir -p build
          # nimble >= 0.22 swallows exit codes from `exec` failures inside
          # task bodies (returns 0 even when the spawned binary aborted).
          # Grep the captured log for ASAN/abort/exception markers as a
          # backstop so a green job actually means a green job.
          rc_overall=0
          for task in $TASKS; do
            echo "=== nimble $task ==="
            log="build/log_${task}.txt"
            set -o pipefail
            nimble --verbose "$task" -y 2>&1 | tee "$log"
            rc=${PIPESTATUS[0]}
            set +o pipefail
            if [ "$rc" -ne 0 ]; then
              echo "::error::Task $task: nimble exited with code $rc"
              rc_overall=1
              continue
            fi
            if grep -qE 'AddressSanitizer:|ThreadSanitizer:|LeakSanitizer:|runtime error:|detected memory leaks|==[0-9]+==ABORTING|Exception raised during nimble script execution' "$log"; then
              echo "::error::Task $task: sanitizer/abort diagnostic detected in log despite nimble exiting 0 (nimble >= 0.22 bug)"
              rc_overall=1
              continue
            fi
          done
          exit $rc_overall

      - name: Run tasks (Windows)
        if: runner.os == 'Windows'
        env:
          TASKS: ${{ inputs.tasks }}
        shell: pwsh
        run: |
          # TSan and LSan are unsupported on Windows clang, so 'all' on Windows
          # is ASan+UBSan only (allAsan). Pick allTsan/allAsanLeak explicitly
          # only on a Linux/macOS runner.
          $all = @("allAsan")
          $taskList = if ($env:TASKS -eq "all") { $all } else { @($env:TASKS) }
          New-Item -ItemType Directory -Force -Path build | Out-Null
          # nimble >= 0.22 may swallow exit codes from `exec` failures inside
          # task bodies. Grep the captured log for ASAN/abort markers as a
          # backstop so a green job actually means a green job.
          $rcOverall = 0
          foreach ($task in $taskList) {
            Write-Host "=== nimble $task ==="
            $log = "build/log_$task.txt"
            nimble --verbose $task -y 2>&1 | Tee-Object -FilePath $log
            $rc = $LASTEXITCODE
            if ($rc -ne 0) {
              Write-Host "::error::Task ${task}: nimble exited with code $rc"
              $rcOverall = 1
              continue
            }
            if (Select-String -Path $log -Pattern 'AddressSanitizer:|ThreadSanitizer:|LeakSanitizer:|runtime error:|detected memory leaks|==\d+==ABORTING|Exception raised during nimble script execution' -Quiet) {
              Write-Host "::error::Task ${task}: sanitizer/abort diagnostic detected in log despite nimble exiting 0 (nimble >= 0.22 bug)"
              $rcOverall = 1
              continue
            }
          }
          exit $rcOverall
