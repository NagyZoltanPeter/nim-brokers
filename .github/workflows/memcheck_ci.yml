name: Memcheck CI

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner platform"
        required: true
        type: choice
        default: ubuntu-latest
        options:
          - ubuntu-latest
          - windows-latest
          - macos-latest
          - macos-15
          - macos-15-intel
      nim-version:
        description: "Nim compiler version (semver, accepted by jiro4989/setup-nim-action)"
        required: true
        type: choice
        default: "2.2.10"
        options:
          - "2.2.10"
          - "2.2.4"
          - "devel"
      tasks:
        description: "ASAN task(s) to run"
        required: true
        type: choice
        default: all
        options:
          - all
          - testFfiApiCppAsanOrc
          - testFfiApiCppAsanRefc
          - testMtEventBrokerAsanOrc
          - testMtEventBrokerAsanRefc
          - testMtRequestBrokerAsanOrc
          - testMtRequestBrokerAsanRefc

permissions:
  contents: read

jobs:
  memcheck-ci:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ inputs.nim-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y clang

      - name: Ensure clang in PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $llvmBin = "C:\Program Files\LLVM\bin"
          if (Test-Path $llvmBin) {
            Write-Host "Found LLVM at $llvmBin"
            echo $llvmBin >> $env:GITHUB_PATH
          } else {
            Write-Host "LLVM not found, installing via choco..."
            choco install llvm -y --no-progress
            echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH
          }

      - name: Locate ASAN runtime DLL (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # clang's -fsanitize=address links the .exe against
          # clang_rt.asan_dynamic-x86_64.dll which lives under
          # LLVM\lib\clang\<ver>\lib\windows, not LLVM\bin. Without it on
          # PATH the test binary fails STATUS_DLL_NOT_FOUND on launch and
          # produces no stderr — nimble only sees a non-zero exit.
          $asan = Get-ChildItem "C:\Program Files\LLVM\lib\clang" `
            -Filter "clang_rt.asan_dynamic-x86_64.dll" `
            -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($asan) {
            Write-Host "ASAN runtime: $($asan.FullName)"
            echo $asan.DirectoryName >> $env:GITHUB_PATH
          } else {
            Write-Host "::warning::clang_rt.asan_dynamic-x86_64.dll not found under C:\Program Files\LLVM\lib\clang"
          }

      - name: Show tool versions
        shell: bash
        run: |
          nim --version
          nimble --version
          clang --version || echo "clang not available"
          cmake --version || echo "cmake not available"

      - name: Install dependencies
        run: |
          nimble setup -l
          nimble install -d -y

      - name: Run tasks (Unix)
        if: runner.os != 'Windows'
        env:
          TASKS: ${{ inputs.tasks }}
        run: |
          ALL="testFfiApiCppAsanOrc testFfiApiCppAsanRefc testMtEventBrokerAsanOrc testMtEventBrokerAsanRefc testMtRequestBrokerAsanOrc testMtRequestBrokerAsanRefc"
          [ "$TASKS" = "all" ] && TASKS="$ALL"
          mkdir -p build
          # nimble >= 0.22 swallows exit codes from `exec` failures inside
          # task bodies (returns 0 even when the spawned binary aborted).
          # Grep the captured log for ASAN/abort/exception markers as a
          # backstop so a green job actually means a green job.
          rc_overall=0
          for task in $TASKS; do
            echo "=== nimble $task ==="
            log="build/log_${task}.txt"
            set -o pipefail
            nimble --verbose "$task" -y 2>&1 | tee "$log"
            rc=${PIPESTATUS[0]}
            set +o pipefail
            if [ "$rc" -ne 0 ]; then
              echo "::error::Task $task: nimble exited with code $rc"
              rc_overall=1
              continue
            fi
            if grep -qE 'AddressSanitizer:|==[0-9]+==ABORTING|Exception raised during nimble script execution' "$log"; then
              echo "::error::Task $task: ASAN/abort diagnostic detected in log despite nimble exiting 0 (nimble >= 0.22 bug)"
              rc_overall=1
              continue
            fi
          done
          exit $rc_overall

      - name: Run tasks (Windows)
        if: runner.os == 'Windows'
        env:
          TASKS: ${{ inputs.tasks }}
        shell: pwsh
        run: |
          $all = @(
            "testFfiApiCppAsanOrc", "testFfiApiCppAsanRefc",
            "testMtEventBrokerAsanOrc", "testMtEventBrokerAsanRefc",
            "testMtRequestBrokerAsanOrc", "testMtRequestBrokerAsanRefc"
          )
          $taskList = if ($env:TASKS -eq "all") { $all } else { @($env:TASKS) }
          New-Item -ItemType Directory -Force -Path build | Out-Null
          # nimble >= 0.22 may swallow exit codes from `exec` failures inside
          # task bodies. Grep the captured log for ASAN/abort markers as a
          # backstop so a green job actually means a green job.
          $rcOverall = 0
          foreach ($task in $taskList) {
            Write-Host "=== nimble $task ==="
            $log = "build/log_$task.txt"
            nimble --verbose $task -y 2>&1 | Tee-Object -FilePath $log
            $rc = $LASTEXITCODE
            if ($rc -ne 0) {
              Write-Host "::error::Task $task: nimble exited with code $rc"
              $rcOverall = 1
              continue
            }
            if (Select-String -Path $log -Pattern 'AddressSanitizer:|==\d+==ABORTING|Exception raised during nimble script execution' -Quiet) {
              Write-Host "::error::Task $task: ASAN/abort diagnostic detected in log despite nimble exiting 0 (nimble >= 0.22 bug)"
              $rcOverall = 1
              continue
            }
          }
          exit $rcOverall
