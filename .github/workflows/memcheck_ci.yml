name: Memcheck CI

on:
  workflow_dispatch:
    inputs:
      nim-version:
        description: "Nim compiler version"
        required: true
        type: choice
        default: version-2-2
        options:
          - version-2-2
          - version-2-0
          - devel
      tasks:
        description: "ASAN task(s) to run"
        required: true
        type: choice
        default: all
        options:
          - all
          - testFfiApiCppAsanOrc
          - testFfiApiCppAsanRefc
          - testMtEventBrokerAsanOrc
          - testMtEventBrokerAsanRefc
          - testMtRequestBrokerAsanOrc
          - testMtRequestBrokerAsanRefc

permissions:
  contents: read

jobs:
  memcheck:
    uses: status-im/nimbus-common-workflow/.github/workflows/common.yml@main
    with:
      nim-versions: '["${{ inputs.nim-version }}"]'
      nimble-version: 1267aa826b187ede62f8e1deb9eb40ca1038260f
      test-command: |
        if [ "$RUNNER_OS" = "Linux" ]; then
          sudo apt-get update -qq && sudo apt-get install -y clang
        elif [ "$RUNNER_OS" = "Windows" ]; then
          # windows-latest ships LLVM; ensure it is on PATH (Git Bash path syntax)
          LLVM_BIN="/c/Program Files/LLVM/bin"
          if [ -d "$LLVM_BIN" ] && ! command -v clang >/dev/null 2>&1; then
            export PATH="$LLVM_BIN:$PATH"
          fi
          clang --version
        fi
        # macOS: Apple clang with ASAN support is pre-installed, no action needed
        nimble setup -l
        TASKS="${{ inputs.tasks }}"
        ALL="testFfiApiCppAsanOrc testFfiApiCppAsanRefc testMtEventBrokerAsanOrc testMtEventBrokerAsanRefc testMtRequestBrokerAsanOrc testMtRequestBrokerAsanRefc"
        [ "$TASKS" = "all" ] && TASKS="$ALL"
        for task in $TASKS; do
          echo "=== nimble $task ==="
          nimble --verbose "$task" -y || exit 1
        done
