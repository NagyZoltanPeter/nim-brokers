name: Manual Nim CI (Windows)

on:
  workflow_dispatch:
    inputs:
      tasks:
        description: 'Nimble tasks to run (space-separated)'
        required: false
        default: 'test'
        type: choice
        options:
          - test
          - testApi
          - testFfiApi
          - test testApi testFfiApi

permissions:
  contents: read

jobs:
  nim-test-windows:
    runs-on: windows-latest
    env:
      NIM_VERSION: '2.2.0'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ env.NIM_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show tool versions
        shell: pwsh
        run: |
          nim --version
          nimble --version
          git --version

      - name: Show CPU info
        shell: pwsh
        run: |
          Get-CimInstance Win32_Processor |
            Select-Object Name, NumberOfCores, NumberOfLogicalProcessors |
            Format-List

      - name: Install dependencies
        shell: pwsh
        run: |
          nimble setup -l
          nimble install -d -y

      - name: Show workspace state
        shell: pwsh
        run: |
          Write-Host "=== Repository root ==="
          Get-ChildItem -Force
          Write-Host "=== nimbledeps ==="
          if (Test-Path "nimbledeps") {
            Get-ChildItem "nimbledeps" -Force
          } else {
            Write-Host "nimbledeps does not exist yet"
          }

      - name: Run Nimble tasks
        shell: pwsh
        run: |
          foreach ($task in "${{ inputs.tasks }}".Split(" ")) {
            Write-Host "=== nimble $task ==="
            nimble --verbose $task -y
            if ($LASTEXITCODE -ne 0) {
              Write-Host "=== FAILED: nimble $task ==="
              exit $LASTEXITCODE
            }
          }

