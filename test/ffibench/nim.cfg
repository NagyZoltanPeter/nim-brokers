# Project-level config for the benchlib DLL build.
#
# On Windows+GCC, Nim's system nim.cfg appends
#   gcc.options.linker %= "-Wl,-Bstatic -lpthread"
# for every build. That flag is fine for executables but fails for DLL
# builds (--app:lib) because Nim's bundled MinGW ships only the dynamic
# import library. A project-level `=` assignment replaces the accumulated
# value: keep -lpthread, drop -Wl,-Bstatic.
@if windows:
  @if gcc:
    gcc.options.linker = "-lpthread"
  @end
@end
