# Project-level config for the pytestlib DLL build.
#
# On Windows+GCC, Nim's system nim.cfg appends
#   gcc.options.linker %= "-Wl,-Bstatic -lpthread"
# for every build.  That flag is fine for executables (which have access to
# libpthread.a in Nim's bundled MinGW dist/mingw), but fails for DLL builds
# (--app:lib) because Nim's bundled MinGW ships only libpthread.dll.a
# (the dynamic import library) — not the static libpthread.a.
#
# A project-level `=` assignment is processed after the system nim.cfg
# and therefore replaces its accumulated value.  We keep -lpthread so
# the pthreads runtime is still linked, but omit -Wl,-Bstatic so the
# linker uses the dynamic import library instead.
@if windows:
  @if gcc:
    gcc.options.linker = "-lpthread"
  @end
@end
